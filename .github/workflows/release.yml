name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Builds Podwires Desktop for macOS (arm64 + x64), Windows (x64), and Linux
# (x64) whenever a git tag of the form `v*` is pushed, and drafts a GitHub
# Release with every artifact attached. The release stays a draft so a human
# can write changelog copy and hit "Publish".
#
# How to ship a new version:
#   1. Bump "version" in package.json
#   2. git commit -am "release: 1.2.3"
#   3. git tag v1.2.3 && git push --follow-tags
#   4. Wait ~10 min, review the draft Release on GitHub, click Publish.
#
# The `workflow_dispatch` trigger lets maintainers also run a one-off build
# from the Actions UI without tagging (useful for dry-runs).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to upload release assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Linux builds of .deb packages need a few system libraries present.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fakeroot dpkg

      # macOS signing/notarisation — only runs when the secrets are present.
      # In a public repo you can skip signing until you're ready to pay for a
      # Developer ID; users will see a Gatekeeper warning the first launch.
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK:             ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD:     ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID:             ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        env:
          CSC_LINK:         ${{ secrets.WIN_CERT_PFX_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: podwires-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Draft GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.blockmap' -o \
            -name 'latest*.yml' \
          \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Podwires Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
